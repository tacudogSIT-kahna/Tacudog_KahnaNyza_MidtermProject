<div class="adventure-pouch-container">
  <h2 class="pouch-title">✨ Your Adventure Pouch ✨</h2>

  <div class="pouch-scroll-wrapper">
    <div class="cart-items-list">
      @if (cartItems().length > 0) {
        @for (cartItem of cartItems(); track cartItem.id) {
          <app-cart-item-row
            [item]="cartItem"
            (updateQty)="onQuantityChange($event)"
            (removeItem)="onItemRemove($event)">
          </app-cart-item-row>
        }
      } @else {
        <div class="empty-pouch-state">
          <div class="empty-leaf-icon">🍃</div>
          <p>Your pouch is empty! Grab some gear from the bazaar catalog.</p>
        </div>
      }
    </div>

    <div class="order-summary-box">
      <h3>📜 Order Summary</h3>
      <div class="summary-row">
        <span>Total Cost:</span>
        <span class="final-price">{{ totalCost() }} 💰</span>
      </div>
      
      <div class="action-buttons">
        <button class="btn-action checkout" (click)="onCheckout()">⚔️ Checkout Order</button>
        <button class="btn-action empty" (click)="onClearCart()">🧹 Empty Pouch</button>
      </div>
    </div>
  </div>
</div>
