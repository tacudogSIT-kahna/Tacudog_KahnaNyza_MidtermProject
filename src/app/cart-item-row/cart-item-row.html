<div class="cart-card">
  <div class="item-img-frame">
    <img [src]="item.imageUrl" [alt]="item.name" class="item-thumbnail">
  </div>
  
  <div class="item-details">
    <h4 class="item-name">{{ item.name }}</h4>
    <p class="item-price">{{ item.price }} 💰 <small>each</small></p>
  </div>

  <div class="quantity-controls">
    <button class="qty-btn minus" (click)="handleQuantityChange(-1)">-</button>
    <span class="qty-display">{{ item.quantity }}</span>
    <button class="qty-btn plus" (click)="handleQuantityChange(1)">+</button>
  </div>

  <div class="item-total-section">
    <span class="total-cost">{{ item.price * item.quantity }} 💰</span>
    <button class="remove-btn" (click)="handleRemoval()" title="Discard Item">🗑️</button>
  </div>
</div>
